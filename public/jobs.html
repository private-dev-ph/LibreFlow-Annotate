<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs – LibreFlow Annotate</title>
  <link rel="stylesheet" href="/css/nav.css" />
  <link rel="stylesheet" href="/css/jobs.css" />
</head>
<body>

  <!-- ── Top Navigation ── -->
  <nav id="top-nav">
    <div class="nav-left">
      <a class="nav-logo" href="/dashboard">
        <span class="nav-logo-icon">■</span>
        <span class="nav-logo-name">LibreFlow Annotate</span>
      </a>
      <div class="nav-links">
        <a class="nav-link" href="/dashboard">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a class="nav-link active" href="/jobs">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14.93V17a1 1 0 0 1-2 0v-.07A8 8 0 0 1 4.07 11H4a1 1 0 0 1 0-2h.07A8 8 0 0 1 11 4.07V4a1 1 0 0 1 2 0v.07A8 8 0 0 1 19.93 11H20a1 1 0 0 1 0 2h-.07A8 8 0 0 1 13 16.93z"/></svg>
          Jobs
          <span id="jobs-badge" class="nav-badge hidden">0</span>
        </a>
        <a class="nav-link" href="/models">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          Models
        </a>
      </div>
    </div>
    <div class="nav-right">
      <div class="nav-notif-wrap" id="nav-notif-wrap">
        <button class="nav-notif-btn" id="nav-notif-btn" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="nav-notif-badge hidden" id="nav-notif-badge">0</span>
        </button>
        <div class="nav-inbox-dropdown hidden" id="nav-inbox-dropdown"></div>
      </div>
      <div class="nav-user">
        <div class="nav-avatar" id="nav-avatar">?</div>
        <span class="nav-username" id="nav-username">Loading…</span>
      </div>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </nav>

  <!-- ── Page Body ── -->
  <div class="jobs-body">
    <div class="jobs-container">

      <div class="jobs-header">
        <h1>Jobs</h1>
        <button class="btn-clear" id="btn-clear">Clear Completed</button>
      </div>

      <div id="jobs-list" class="jobs-list"></div>

      <div id="jobs-empty" class="jobs-empty" style="display:none">
        <div class="jobs-empty-icon">🕒</div>
        <h2>No jobs yet</h2>
        <p>Upload images or models to a project to see jobs here.</p>
      </div>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/jobs.js"></script>
  <script src="/js/nav-inbox.js"></script>
  <script src="/js/jobs-page.js"></script>
</body>
</html>
